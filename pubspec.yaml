name: gatuno
description: 'O Gatuno é um sistema desenvolvido para organizar e compartilhar uma coleção pessoal de e-books em uma rede local.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  dio: ^5.9.2
  dio_cookie_manager: ^3.1.2
  cookie_jar: ^4.0.8
  flutter_secure_storage: ^10.0.0
  get_it: ^9.2.1
  email_validator: ^3.0.0
  provider: ^6.1.2
  dio_cache_interceptor: ^4.0.0
  path_provider: ^2.1.5
  http_cache_file_store: ^2.0.1
  optional: ^6.1.0+1
  flutter_markdown_plus: ^1.0.7
  flutter_html: ^3.0.0
  json_annotation: ^4.11.0
  file_picker: ^12.0.0-beta.7
  crypto: ^3.0.7
  equatable: ^2.0.8
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  socket_io_client: ^3.1.4
  blurhash_dart: ^1.2.1
  image: ^4.8.0
  share_plus: ^13.1.0
  open_filex: ^4.7.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4
  json_serializable: ^6.13.1
  build_runner: ^2.15.0
  drift_dev: ^2.32.1

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path_ios: 'assets/icon.png'
  image_path_android: 'assets/icon.png'
  adaptive_icon_background: '#020416'
  adaptive_icon_foreground: 'assets/icon.png'
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: '#020416'

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
  fonts:
    - family: Inknut Antiqua
      fonts:
        - asset: assets/fonts/InknutAntiqua/InknutAntiqua-Light.ttf
          weight: 300
        - asset: assets/fonts/InknutAntiqua/InknutAntiqua-Regular.ttf
          weight: 400
        - asset: assets/fonts/InknutAntiqua/InknutAntiqua-Medium.ttf
          weight: 500
        - asset: assets/fonts/InknutAntiqua/InknutAntiqua-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/InknutAntiqua/InknutAntiqua-Bold.ttf
          weight: 700
        - asset: assets/fonts/InknutAntiqua/InknutAntiqua-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/InknutAntiqua/InknutAntiqua-Black.ttf
          weight: 900
