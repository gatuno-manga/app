name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_and_gate:
    name: Validate release trigger and source
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v5
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Git LFS Pull
        run: git lfs pull

      - name: Validate release tag format
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              echo "::error::Release workflow must run from a tag ref."
              exit 1
          fi

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "::error::Invalid release tag '${TAG}'. Expected vMAJOR.MINOR.PATCH."
              exit 1
          fi

      - name: Ensure tag commit is reachable from main
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
              echo "::error::Tag commit ${GITHUB_SHA} is not reachable from origin/main."
              exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # Future build/release jobs must declare: needs: validate_and_gate
  ready_for_builds:
    name: Ready for downstream build jobs
    runs-on: ubuntu-latest
    needs: validate_and_gate
    steps:
      - name: Confirm release gate status
        run: echo "Release validation gates passed."
